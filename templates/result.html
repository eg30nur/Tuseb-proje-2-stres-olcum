<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İşlem Tamamlandı</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .result-card {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }

        .score-badge {
            font-size: 3rem;
            font-weight: bold;
            color: #dc3545;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="result-card">
        {% if already_done %}
        <div class="text-warning mb-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" class="bi bi-exclamation-triangle-fill" viewBox="0 0 16 16">
                <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5m.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2" />
            </svg>
        </div>
        <h4>Bu Form Daha Önce Doldurulmuş!</h4>
        <p class="text-muted">Bu seans için anket verisi sistemimizde zaten mevcut.</p>
        {% else %}
        <div class="text-success mb-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" class="bi bi-check-circle-fill" viewBox="0 0 16 16">
                <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0m-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z" />
            </svg>
        </div>
        <h4>Katılımınız İçin Teşekkürler</h4>
        <p class="text-muted">Anksiyete değerlendirme formunuz başarıyla hekiminize iletildi.</p>
        {% endif %}

        <div class="border-top pt-3">
            <span class="text-muted d-block mb-1">Toplam MDAS Skorunuz</span>
            <div class="score-badge">{{ score }}</div>
            <small class="text-muted">(Ölçek Aralığı: 5 - 25)</small>
        </div>
    </div>

</body>
</html>
